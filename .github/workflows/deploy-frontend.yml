name: Deploy Frontend to DigitalOcean

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "=== [Frontend Deploy] Starting ==="

            # Go to frontend subfolder inside the main project
            cd /opt/spider-store

            # Pull latest frontend code
            if [ -d "frontend/.git" ]; then
              echo "=== Pulling latest frontend code ==="
              cd frontend && git pull origin main || git pull origin master && cd ..
            else
              echo "=== Cloning frontend repo ==="
              git clone https://github.com/minasamir1401/spider-store-front.git frontend
            fi

            # Rebuild and restart frontend only
            echo "=== Rebuilding frontend container ==="
            docker-compose build --no-cache frontend

            echo "=== Restarting frontend ==="
            docker-compose up -d frontend

            # Clean up unused Docker images
            docker image prune -f

            echo "=== [Frontend Deploy] Done! ==="
            docker-compose ps
